## This Alfresco Platform Configuration file should be used for custom properties that are introduced by this module.
## Define default values for all properties here.
## System Administrators can override these values in environment specific configurations in
## alfresco/tomcat/shared/classes/alfresco-global.properties.
##

# Digest algorithm used when computing checksums. Any value accepted by java.security.MessageDigest is valid.
# Supported values: MD5, SHA-1, SHA-256, SHA-512
checksum.algorithm=SHA-256

# When true, uploading content that is identical to an existing node's content will be rejected
# (the transaction is rolled back and the upload fails). When false, duplicates are allowed.
checksum.duplicates.reject=false

